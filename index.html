<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pomodoro Todos</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <section class="timer-panel" data-pomodoro-timer aria-labelledby="app-title">
        <header class="app-header">
          <div>
            <p class="eyebrow">Pomodoro</p>
            <h1 id="app-title">Focus Timer</h1>
          </div>
          <span class="session-count"><span data-completed-count>0</span> focus sessions</span>
        </header>

        <div class="session-tabs" aria-label="Session type">
          <button class="session-tab" type="button" data-session-mode="focus" aria-pressed="true">Focus</button>
          <button class="session-tab" type="button" data-session-mode="break" aria-pressed="false">Break</button>
        </div>

        <form class="duration-settings" data-duration-settings>
          <label>
            <span>Focus min</span>
            <input data-duration-input="focus" type="number" min="1" step="1" inputmode="numeric" value="25">
          </label>
          <label>
            <span>Break min</span>
            <input data-duration-input="break" type="number" min="1" step="1" inputmode="numeric" value="5">
          </label>
          <button type="submit" data-duration-save>Save</button>
          <span data-duration-status aria-live="polite"></span>
        </form>

        <section class="timer-face" aria-live="polite">
          <p class="session-label" data-session-label>Focus</p>
          <div class="timer-display" data-timer-display>25:00</div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-bar" data-timer-progress></div>
          </div>
          <p class="timer-status" data-timer-status>Ready to focus</p>
        </section>

        <div class="timer-controls">
          <button class="primary-action" type="button" data-timer-action="start">Start</button>
          <button type="button" data-timer-action="pause" disabled>Pause</button>
          <button type="button" data-timer-action="reset">Reset</button>
        </div>

        <div class="notification-row">
          <button type="button" data-notification-permission>Enable notifications</button>
          <span data-notification-status>Notifications: default</span>
        </div>
      </section>

      <section class="todo-panel" aria-labelledby="todo-title">
        <header class="app-header">
          <div>
            <p class="eyebrow">Todo</p>
            <h2 id="todo-title">Today</h2>
          </div>
          <span class="todo-count" data-todo-count>0 active / 0 complete</span>
        </header>

        <form class="todo-form" data-todo-form>
          <label class="sr-only" for="todo-input">New todo</label>
          <input id="todo-input" data-todo-input type="text" autocomplete="off" placeholder="Add a todo">
          <button type="submit">Add</button>
        </form>

        <div class="todo-search">
          <label class="sr-only" for="todo-search">Search todos</label>
          <input id="todo-search" data-todo-search type="search" autocomplete="off" placeholder="Search todos">
        </div>

        <div class="todo-filters" role="group" aria-label="Todo filter">
          <button class="todo-filter" type="button" data-todo-filter="all" aria-pressed="true">All</button>
          <button class="todo-filter" type="button" data-todo-filter="active" aria-pressed="false">Active</button>
          <button class="todo-filter" type="button" data-todo-filter="completed" aria-pressed="false">Completed</button>
        </div>

        <ul class="todo-list" data-todo-list aria-live="polite"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
